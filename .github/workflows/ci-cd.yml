name: DevSecOps Pipeline - Zero VM Config (Autofix Ready)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
 
  REPO_URL: ${{ github.server_url }}/${{ github.repository }}.git

jobs:
  sast:
    name: SAST + SCA + DAST + DefectDojo
    runs-on: self-hosted

    steps:
    - name: Récupérer le code
      uses: actions/checkout@v4

    - name: Installer les dépendances
      run: npm ci

    - name: Installer jq (sans blocage)
      run: |
        if command -v jq &> /dev/null; then
          echo "jq déjà installé: $(jq --version)"
          exit 0
        fi

        echo "Nettoyage des processus apt bloqués..."
        sudo killall apt apt-get dpkg 2>/dev/null || true
        sudo rm -f /var/lib/dpkg/lock-frontend /var/lib/dpkg/lock
        sudo rm -f /var/cache/apt/archives/lock /var/lib/apt/lists/lock
        sudo dpkg --configure -a

        echo "Tentative d'installation via apt..."
        if sudo apt update -qq && sudo apt install -y -qq jq; then
          echo "jq installé avec apt: $(jq --version)"
        else
          echo "Échec apt, installation directe du binaire..."
          wget -q -O jq https://github.com/jqlang/jq/releases/download/jq-1.7.1/jq-linux64
          chmod +x jq
          sudo mv jq /usr/local/bin/
          echo "jq installé via binaire: $(jq --version)"
        fi

    # =========================================================
    # SAST - SEMGREP
    # =========================================================
    - name: SAST avec Semgrep (scan)
      uses: returntocorp/semgrep-action@v1
      continue-on-error: true
      with:
        config: p/security-audit

    - name: Générer rapport Semgrep JSON
      run: semgrep --config .semgrep.yml --json --output semgrep-results.json || true

    - name: ✅ Enrichir rapport Semgrep pour Autofix
      # Semgrep génère déjà file_path et line dans son JSON natif.
      # Ce step ajoute repo_url et static_finding=true à chaque finding
      # via une transformation jq pour que DefectDojo les reçoive correctement.
      run: |
        REPO_URL="${{ github.server_url }}/${{ github.repository }}.git"

        if [ -f semgrep-results.json ] && [ -s semgrep-results.json ]; then
          echo "Enrichissement du rapport Semgrep avec les métadonnées autofix..."

          # Semgrep JSON natif : les findings sont dans .results[]
          # Chaque finding a déjà : .path (= file_path) et .start.line (= line)
          # On injecte repo_url et static_finding pour DefectDojo
          jq --arg repo_url "$REPO_URL" '
            .results = [
              .results[] |
              . + {
                "repo_url": $repo_url,
                "static_finding": true
              }
            ]
          ' semgrep-results.json > semgrep-results-enriched.json

          mv semgrep-results-enriched.json semgrep-results.json
          echo "Rapport Semgrep enrichi avec succès"
          echo "Exemple du premier finding:"
          jq '.results[0] | {path, line: .start.line, repo_url, static_finding}' semgrep-results.json 2>/dev/null || true
        else
          echo "Aucun résultat Semgrep à enrichir"
        fi

    # =========================================================
    # SCA - SNYK
    # =========================================================
    - name: Snyk SCA
      uses: snyk/actions/node@master
      continue-on-error: true
      env:
        SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      with:
        args: >
          --severity-threshold=low
          --json-file-output=snyk-results.json
          --org=813196ac-406b-4dfe-8cc3-1f640d42d4fe

    - name: ✅ Enrichir rapport Snyk pour Autofix
      # Snyk JSON inclut déjà les CVE/CWE et component_name/version
      # Ce step ajoute repo_url et static_finding aux vulnérabilités
      run: |
        REPO_URL="${{ github.server_url }}/${{ github.repository }}.git"

        if [ -f snyk-results.json ] && [ -s snyk-results.json ]; then
          echo "Enrichissement du rapport Snyk..."

          # Snyk JSON : .vulnerabilities[] contient chaque vuln
          # On injecte les champs requis par InvisiThreat
          jq --arg repo_url "$REPO_URL" '
            if .vulnerabilities then
              .vulnerabilities = [
                .vulnerabilities[] |
                . + {
                  "repo_url": $repo_url,
                  "static_finding": true,
                  "file_path": (.from | if type == "array" then join(" > ") else . end)
                }
              ]
            else . end
          ' snyk-results.json > snyk-results-enriched.json

          mv snyk-results-enriched.json snyk-results.json
          echo "Rapport Snyk enrichi"
        fi

    # =========================================================
    # DAST - ZAP
    # =========================================================
    - name: Démarrer l'API en arrière-plan
      run: |
        echo "Démarrage de l'API sur http://localhost:3000"
        npm start &
        echo $! > api.pid
        sleep 15

        for i in {1..10}; do
          if curl -s -f http://localhost:3000/health > /dev/null; then
            echo "API démarrée avec succès"
            exit 0
          fi
          echo "Tentative $i/10..."
          sleep 3
        done
        echo "API n'a pas démarré"
        exit 1

    - name: DAST - Scan OpenAPI
      run: |
        docker run --rm \
          --memory="2g" \
          --cpus="2" \
          --network host \
          -v $(pwd):/zap/wrk:rw \
          ghcr.io/zaproxy/zaproxy:stable \
          zap-api-scan.py \
          -t http://localhost:3000 \
          -f openapi \
          -d openapi.yaml \
          -x zap-openapi.xml \
          -J zap-openapi.json \
          -T 120 || true
      continue-on-error: true

    - name: Vérifier rapport OpenAPI
      run: |
        if [ -f zap-openapi.json ]; then
          echo "Fichier trouvé: zap-openapi.json"
        elif [ -f zap_out.json ]; then
          cp zap_out.json zap-openapi.json
        elif [ -f report_json.json ]; then
          cp report_json.json zap-openapi.json
        else
          echo "[]" > zap-openapi.json
        fi

    - name: DAST - Spider Scan
      uses: zaproxy/action-baseline@v0.12.0
      continue-on-error: true
      with:
        target: 'http://localhost:3000'
        cmd_options: '-x zap-spider.xml -j -T 300'
        allow_issue_writing: false

    - name: Sauvegarder rapport Spider
      run: |
        if [ -f report_json.json ]; then
          cp report_json.json zap-spider.json
        elif [ -f zap-out.json ]; then
          cp zap-out.json zap-spider.json
        fi

    - name: DAST - Active Scan
      uses: zaproxy/action-full-scan@v0.12.0
      continue-on-error: true
      with:
        target: 'http://localhost:3000'
        cmd_options: '-x zap-active.xml -a -j -T 60'
        rules_file_name: '.zap/rules.tsv'
        allow_issue_writing: false

    - name: Sauvegarder rapport Active Scan
      run: |
        if [ -f report_json.json ]; then
          cp report_json.json zap-active.json
        elif [ -f zap-out.json ]; then
          cp zap-out.json zap-active.json
        fi

    - name: Consolider les rapports DAST
      run: |
        echo "Consolidation des rapports DAST..."
        echo "[]" > zap-consolidated.json

        if ls zap-*.json 1> /dev/null 2>&1; then
          jq -s 'add' zap-*.json > zap-consolidated.json 2>/dev/null || echo "[]" > zap-consolidated.json
        fi

        if [ -s zap-consolidated.json ]; then
          TOTAL=$(jq 'length' zap-consolidated.json 2>/dev/null || echo "0")
          CRITICAL=$(jq '[.[] | select(.riskcode=="3")] | length' zap-consolidated.json 2>/dev/null || echo "0")
          HIGH=$(jq '[.[] | select(.riskcode=="2")] | length' zap-consolidated.json 2>/dev/null || echo "0")
          MEDIUM=$(jq '[.[] | select(.riskcode=="1")] | length' zap-consolidated.json 2>/dev/null || echo "0")
          LOW=$(jq '[.[] | select(.riskcode=="0")] | length' zap-consolidated.json 2>/dev/null || echo "0")

          echo "RÉSULTATS DAST:"
          echo "  Total: $TOTAL vulnérabilités"
          echo "  Critiques: $CRITICAL | Hautes: $HIGH | Moyennes: $MEDIUM | Basses: $LOW"
        fi

    - name: Arrêter l'API
      if: always()
      run: |
        if [ -f api.pid ]; then
          PID=$(cat api.pid)
          kill $PID 2>/dev/null || true
          rm -f api.pid
        fi
        pkill -f "node.*app.js" || true

    # =========================================================
    # UPLOAD ARTIFACTS
    # =========================================================
    - name: Upload tous les rapports de sécurité
      uses: actions/upload-artifact@v4
      with:
        name: security-reports-${{ github.sha }}
        path: |
          semgrep-results.json
          snyk-results.json
          zap-*.json

    # =========================================================
    # DEFECTDOJO - Import avec tous les champs Autofix
    # =========================================================
    - name:  Créer/Mettre à jour l'Engagement DefectDojo avec source_code_management_uri
      # REQUIS pour l'autofix : l'engagement DOIT avoir source_code_management_uri
      # Sans ce champ, InvisiThreat ne sait pas où créer la Pull Request
      env:
        DD_URL: http://localhost:8080
        DD_API_KEY: ${{ secrets.DEFECTDOJO_API_KEY }}
        PRODUCT_ID: ${{ secrets.PRODUCT_ID }}
      run: |
        REPO_URL="${{ github.server_url }}/${{ github.repository }}.git"
        BRANCH="${{ github.ref_name }}"
        COMMIT="${{ github.sha }}"
        RUN_ID="${{ github.run_id }}"

        echo "Mise à jour de l'engagement avec source_code_management_uri..."

        # Patch de l'engagement existant (ID=1) pour ajouter le repo URL
        # CRITIQUE : source_code_management_uri est lu par InvisiThreat pour créer les PR
        ENGAGEMENT_RESPONSE=$(curl -s -X PATCH "$DD_URL/api/v2/engagements/1/" \
          -H "Authorization: Token $DD_API_KEY" \
          -H "Content-Type: application/json" \
          -d "{
            \"source_code_management_uri\": \"$REPO_URL\",
            \"branch_tag\": \"$BRANCH\",
            \"commit_hash\": \"$COMMIT\",
            \"build_id\": \"$RUN_ID\"
          }")

        if echo "$ENGAGEMENT_RESPONSE" | grep -q "source_code_management_uri"; then
          echo "Engagement mis à jour avec source_code_management_uri: $REPO_URL"
        else
          echo "Réponse engagement: $ENGAGEMENT_RESPONSE"
        fi

    - name: ✅ Importer Semgrep dans DefectDojo (avec file_path + line + static_finding)
      env:
        DD_URL: http://localhost:8080
        DD_API_KEY: ${{ secrets.DEFECTDOJO_API_KEY }}
      run: |
        ENGAGEMENT_ID=1
        REPO_URL="${{ github.server_url }}/${{ github.repository }}.git"

        if [ -f semgrep-results.json ] && [ -s semgrep-results.json ]; then
          echo "Import Semgrep dans DefectDojo..."

          # DefectDojo extrait automatiquement file_path et line du format Semgrep natif.
          # Les champs static_finding=true et repo_url sont envoyés via les paramètres
          # de l'API import-scan (pas dans le fichier JSON).
          SEMGREP_RESPONSE=$(curl -s -X POST "$DD_URL/api/v2/import-scan/" \
            -H "Authorization: Token $DD_API_KEY" \
            -F "engagement=$ENGAGEMENT_ID" \
            -F "scan_type=Semgrep JSON Report" \
            -F "file=@semgrep-results.json" \
            -F "close_old_findings=true" \
            -F "minimum_severity=Info" \
            -F "environment=Development" \
            -F "branch_tag=${{ github.ref_name }}" \
            -F "commit_hash=${{ github.sha }}" \
            -F "build_id=${{ github.run_id }}" \
            -F "static_finding=true" \
            -F "repo_url=$REPO_URL" \
            -F "source_code_management_uri=$REPO_URL")
          # ↑ static_finding=true  → identifie le finding comme SAST (pas DAST)
          # ↑ repo_url             → permet à InvisiThreat de localiser le code source
          # ↑ file_path + line     → lus directement depuis le JSON Semgrep (.path et .start.line)

          if echo "$SEMGREP_RESPONSE" | grep -q '"id"'; then
            echo "Semgrep importé avec succès"
          else
            echo "Réponse Semgrep: $SEMGREP_RESPONSE"
          fi
        else
          echo "Fichier semgrep-results.json non trouvé ou vide"
        fi

    - name: ✅ Importer Snyk dans DefectDojo (avec component_name + component_version + cve + cwe)
      env:
        DD_URL: http://localhost:8080
        DD_API_KEY: ${{ secrets.DEFECTDOJO_API_KEY }}
      run: |
        ENGAGEMENT_ID=1
        REPO_URL="${{ github.server_url }}/${{ github.repository }}.git"

        if [ -f snyk-results.json ] && [ -s snyk-results.json ]; then
          echo "Import Snyk dans DefectDojo..."

          # Snyk JSON contient déjà : CVE, CWE, packageName (component_name),
          # version (component_version) dans son format natif.
          # DefectDojo les extrait automatiquement du fichier Snyk.
          SNYK_RESPONSE=$(curl -s -X POST "$DD_URL/api/v2/import-scan/" \
            -H "Authorization: Token $DD_API_KEY" \
            -F "engagement=$ENGAGEMENT_ID" \
            -F "scan_type=Snyk Scan" \
            -F "file=@snyk-results.json" \
            -F "close_old_findings=true" \
            -F "minimum_severity=Info" \
            -F "environment=Development" \
            -F "branch_tag=${{ github.ref_name }}" \
            -F "commit_hash=${{ github.sha }}" \
            -F "build_id=${{ github.run_id }}" \
            -F "static_finding=true" \
            -F "repo_url=$REPO_URL")
          # ↑ static_finding=true         → requis pour InvisiThreat
          # ↑ repo_url                    → requis pour la PR automatique
          # ↑ cve/cwe/component_name/version → lus depuis le JSON Snyk nativement

          if echo "$SNYK_RESPONSE" | grep -q '"id"'; then
            echo "Snyk importé avec succès"
          else
            echo "Réponse Snyk: $SNYK_RESPONSE"
          fi
        else
          echo "Fichier snyk-results.json non trouvé ou vide"
        fi

    - name: Importer les rapports ZAP dans DefectDojo (DAST - static_finding=false)
      env:
        DD_URL: http://localhost:8080
        DD_API_KEY: ${{ secrets.DEFECTDOJO_API_KEY }}
      run: |
        ENGAGEMENT_ID=1

        echo "Import des rapports ZAP (XML)..."

        # ZAP = DAST donc static_finding=false (pas de file_path ni line)
        # Ces findings n'ont pas besoin de repo_url pour l'autofix SAST

        if [ -f zap-openapi.xml ] && [ -s zap-openapi.xml ]; then
          curl -s -X POST "$DD_URL/api/v2/import-scan/" \
            -H "Authorization: Token $DD_API_KEY" \
            -F "engagement=$ENGAGEMENT_ID" \
            -F "scan_type=ZAP Scan" \
            -F "file=@zap-openapi.xml" \
            -F "close_old_findings=true" \
            -F "static_finding=false"
          echo "ZAP OpenAPI importé"
        fi

        if [ -f zap-spider.xml ] && [ -s zap-spider.xml ]; then
          curl -s -X POST "$DD_URL/api/v2/import-scan/" \
            -H "Authorization: Token $DD_API_KEY" \
            -F "engagement=$ENGAGEMENT_ID" \
            -F "scan_type=ZAP Scan" \
            -F "file=@zap-spider.xml" \
            -F "close_old_findings=true" \
            -F "static_finding=false"
          echo "ZAP Spider importé"
        fi

        if [ -f zap-active.xml ] && [ -s zap-active.xml ]; then
          curl -s -X POST "$DD_URL/api/v2/import-scan/" \
            -H "Authorization: Token $DD_API_KEY" \
            -F "engagement=$ENGAGEMENT_ID" \
            -F "scan_type=ZAP Scan" \
            -F "file=@zap-active.xml" \
            -F "close_old_findings=true" \
            -F "static_finding=false"
          echo "ZAP Active importé"
        fi

    - name: Pipeline terminé
      run: |
        echo "DevSecOps pipeline exécuté avec succès"
        echo "REPO_URL injectée: ${{ github.server_url }}/${{ github.repository }}.git"
        echo "Tous les findings SAST ont static_finding=true et repo_url peuplé"
        echo "L'engagement a source_code_management_uri configuré pour l'autofix"