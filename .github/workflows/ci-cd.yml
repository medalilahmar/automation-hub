name: DevSecOps Pipeline - Zero VM Config

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  sast:
    name: SAST + SCA + DAST + DefectDojo
    runs-on: self-hosted

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer les dépendances
        run: npm ci

      - name: Installer jq (sans blocage)
        run: |
          if command -v jq &>/dev/null; then
            echo "jq déjà installé: $(jq --version)"
            exit 0
          fi
          echo "Nettoyage des processus apt bloqués..."
          sudo killall apt apt-get dpkg 2>/dev/null || true
          sudo rm -f /var/lib/dpkg/lock-frontend
          sudo rm -f /var/lib/dpkg/lock
          sudo rm -f /var/cache/apt/archives/lock
          sudo rm -f /var/lib/apt/lists/lock
          sudo dpkg --configure -a
          echo "Tentative d'installation via apt..."
          if sudo apt update -qq && sudo apt install -y -qq jq; then
            echo "jq installé avec apt: $(jq --version)"
          else
            echo "Échec apt, installation directe du binaire..."
            wget -q -O jq https://github.com/jqlang/jq/releases/download/jq-1.7.1/jq-linux64
            chmod +x jq
            sudo mv jq /usr/local/bin/
            echo "jq installé via binaire: $(jq --version)"
          fi

      - name: SAST avec Semgrep
        uses: returntocorp/semgrep-action@v1
        continue-on-error: true
        with:
          config: p/security-audit

      - name: Snyk SCA
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: >
            --severity-threshold=low
            --json-file-output=snyk-results.json
            --org=813196ac-406b-4dfe-8cc3-1f640d42d4fe

      - name: Démarrer l'API en arrière-plan
        run: |
          echo "Démarrage de l'API sur http://localhost:3000"
          npm start &
          echo $! > api.pid
          sleep 15
          for i in {1..10}; do
            if curl -s -f http://localhost:3000/health >/dev/null; then
              echo "API démarrée avec succès"
              exit 0
            fi
            echo "Tentative $i/10..."
            sleep 3
          done
          echo "API n'a pas démarré"
          exit 1

      - name: DAST - Scan OpenAPI
        run: |
          docker run --rm \
            --memory="2g" \
            --cpus="2" \
            --network host \
            -v $(pwd):/zap/wrk:rw \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-api-scan.py \
            -t http://localhost:3000 \
            -f openapi \
            -d openapi.yaml \
            -x zap-openapi.xml \
            -J zap-openapi.json \
            -T 120 || true
        continue-on-error: true

      - name: Vérifier rapport OpenAPI
        run: |
          if [ -f zap-openapi.json ]; then
            echo "Fichier trouvé: zap-openapi.json"
          elif [ -f zap_out.json ]; then
            echo "Fichier trouvé: zap_out.json"
            cp zap_out.json zap-openapi.json
          elif [ -f report_json.json ]; then
            echo "Fichier trouvé: report_json.json"
            cp report_json.json zap-openapi.json
          else
            echo "Aucun rapport trouvé - mais le scan a réussi !"
            echo "Les résultats sont dans les logs ci-dessus"
            echo "[]" > zap-openapi.json
          fi

      - name: DAST - Spider Scan
        uses: zaproxy/action-baseline@v0.12.0
        continue-on-error: true
        with:
          target: 'http://localhost:3000'
          cmd_options: '-x zap-spider.xml -j -T 300'
          allow_issue_writing: false

      - name: Sauvegarder rapport Spider
        run: |
          if [ -f report_json.json ]; then
            cp report_json.json zap-spider.json
            echo "Rapport Spider sauvegardé"
          elif [ -f zap-out.json ]; then
            cp zap-out.json zap-spider.json
            echo "Rapport Spider sauvegardé (zap-out.json)"
          else
            echo "Aucun rapport Spider trouvé"
          fi

      - name: DAST - Active Scan
        uses: zaproxy/action-full-scan@v0.12.0
        continue-on-error: true
        with:
          target: 'http://localhost:3000'
          cmd_options: '-x zap-active.xml -a -j -T 60'
          rules_file_name: '.zap/rules.tsv'
          allow_issue_writing: false

      - name: Sauvegarder rapport Active Scan
        run: |
          if [ -f report_json.json ]; then
            cp report_json.json zap-active.json
            echo "Rapport Active Scan sauvegardé"
          elif [ -f zap-out.json ]; then
            cp zap-out.json zap-active.json
            echo "Rapport Active Scan sauvegardé (zap-out.json)"
          else
            echo "Aucun rapport Active Scan trouvé"
          fi

      - name: Consolider les rapports DAST
        run: |
          echo "Consolidation des rapports DAST..."
          echo "[]" > zap-consolidated.json
          if ls zap-*.json 1>/dev/null 2>&1; then
            jq -s 'add' zap-*.json > zap-consolidated.json 2>/dev/null || echo "[]" > zap-consolidated.json
          fi
          if [ -s zap-consolidated.json ]; then
            TOTAL=$(jq 'length' zap-consolidated.json 2>/dev/null || echo "0")
            CRITICAL=$(jq '[.[] | select(.riskcode=="3")] | length' zap-consolidated.json 2>/dev/null || echo "0")
            HIGH=$(jq '[.[] | select(.riskcode=="2")] | length' zap-consolidated.json 2>/dev/null || echo "0")
            MEDIUM=$(jq '[.[] | select(.riskcode=="1")] | length' zap-consolidated.json 2>/dev/null || echo "0")
            LOW=$(jq '[.[] | select(.riskcode=="0")] | length' zap-consolidated.json 2>/dev/null || echo "0")
            echo "📊 RÉSULTATS DAST:"
            echo "   Total: $TOTAL vulnérabilités"
            echo "   🔴 Critiques: $CRITICAL"
            echo "   🟠 Hautes: $HIGH"
            echo "   🟡 Moyennes: $MEDIUM"
            echo "   🟢 Basses: $LOW"
          else
            echo "⚠️ Aucune vulnérabilité détectée ou fichier vide"
          fi

      - name: Générer rapport JSON
        run: semgrep --config .semgrep.yml --json --output semgrep-results.json || true

      - name: Extraire métadonnées du projet
        id: pkg_meta
        run: |
          PKG_NAME=$(jq -r '.name // "app"' package.json)
          PKG_VERSION=$(jq -r '.version // "0.0.0"' package.json)
          echo "pkg_name=$PKG_NAME" >> "$GITHUB_OUTPUT"
          echo "pkg_version=$PKG_VERSION" >> "$GITHUB_OUTPUT"
          echo "Composant: $PKG_NAME@$PKG_VERSION"

      - name: Arrêter l'API
        if: always()
        run: |
          echo "Arrêt de l'API..."
          if [ -f api.pid ]; then
            PID=$(cat api.pid)
            kill $PID 2>/dev/null || true
            rm -f api.pid
            echo "API arrêtée (PID: $PID)"
          fi
          pkill -f "node.*app.js" || true
          echo "Nettoyage des processus terminé"

      - name: Upload tous les rapports de sécurité
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: security-reports-${{ github.sha }}
          path: |
            semgrep-results.json
            snyk-results.json
            zap-*.json
          if-no-files-found: warn

      # ✅ CORRECTION : Patch de l'engagement avec source_code_management_uri
      # pour que l'autofix puisse résoudre repo_url si absent au niveau du finding
      - name: Patcher l'engagement DefectDojo avec repo_url
        env:
          DD_URL: http://localhost:8080
          DD_API_KEY: ${{ secrets.DEFECTDOJO_API_KEY }}
        run: |
          ENGAGEMENT_ID=1
          REPO_URL="${{ github.server_url }}/${{ github.repository }}"

          echo "🔧 Patch de l'engagement #$ENGAGEMENT_ID avec source_code_management_uri..."
          PATCH_RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X PATCH "$DD_URL/api/v2/engagements/$ENGAGEMENT_ID/" \
            -H "Authorization: Token $DD_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{\"source_code_management_uri\": \"$REPO_URL\"}")

          if [ "$PATCH_RESPONSE" = "200" ]; then
            echo "✅ Engagement patché avec succès (source_code_management_uri = $REPO_URL)"
          else
            echo "⚠️ Échec du patch de l'engagement (HTTP $PATCH_RESPONSE) — l'autofix utilisera repo_url des findings si disponible"
          fi

      - name: Importer dans DefectDojo
        env:
          DD_URL: http://localhost:8080
          DD_API_KEY: ${{ secrets.DEFECTDOJO_API_KEY }}
          PRODUCT_ID: ${{ secrets.PRODUCT_ID }}
        run: |
          ENGAGEMENT_ID=1
          REPO_URL="${{ github.server_url }}/${{ github.repository }}"
          COMPONENT_NAME="${{ steps.pkg_meta.outputs.pkg_name }}"
          COMPONENT_VERSION="${{ steps.pkg_meta.outputs.pkg_version }}"

          echo "Vérification des fichiers JSON..."

          # 1️⃣ IMPORT SEMGREP (avec autofix)
          if [ -f semgrep-results.json ]; then
            echo "📤 Import Semgrep (Engagement #$ENGAGEMENT_ID)..."
            SEMGREP_RESPONSE=$(curl -s -X POST "$DD_URL/api/v2/import-scan/" \
              -H "Authorization: Token $DD_API_KEY" \
              -F "engagement=$ENGAGEMENT_ID" \
              -F "scan_type=Semgrep JSON Report" \
              -F "file=@semgrep-results.json" \
              -F "static_finding=true" \
              -F "repo_url=$REPO_URL" \
              -F "component_name=$COMPONENT_NAME" \
              -F "component_version=$COMPONENT_VERSION" \
              -F "close_old_findings=true" \
              -F "minimum_severity=Info" \
              -F "environment=Development" \
              -F "branch_tag=${{ github.ref_name }}" \
              -F "commit_hash=${{ github.sha }}" \
              -F "build_id=${{ github.run_id }}")
            if echo "$SEMGREP_RESPONSE" | grep -q "id"; then
              echo "✅ Semgrep importé avec succès !"
            else
              echo "⚠️ Réponse Semgrep: $SEMGREP_RESPONSE"
            fi
          else
            echo "⚠️ Fichier semgrep-results.json non trouvé"
          fi

          # 2️⃣ IMPORT SNYK (avec autofix)
          if [ -f snyk-results.json ]; then
            echo "📤 Import Snyk (Engagement #$ENGAGEMENT_ID)..."
            SNYK_RESPONSE=$(curl -s -X POST "$DD_URL/api/v2/import-scan/" \
              -H "Authorization: Token $DD_API_KEY" \
              -F "engagement=$ENGAGEMENT_ID" \
              -F "scan_type=Snyk Scan" \
              -F "file=@snyk-results.json" \
              -F "static_finding=true" \
              -F "repo_url=$REPO_URL" \
              -F "component_name=$COMPONENT_NAME" \
              -F "component_version=$COMPONENT_VERSION" \
              -F "close_old_findings=true" \
              -F "minimum_severity=Info" \
              -F "environment=Development" \
              -F "branch_tag=${{ github.ref_name }}" \
              -F "commit_hash=${{ github.sha }}" \
              -F "build_id=${{ github.run_id }}")
            if echo "$SNYK_RESPONSE" | grep -q "id"; then
              echo "✅ Snyk importé avec succès !"
            else
              echo "⚠️ Réponse Snyk: $SNYK_RESPONSE"
            fi
          else
            echo "⚠️ Fichier snyk-results.json non trouvé"
          fi

          # 3️⃣ IMPORTS ZAP (sans static_finding, car dynamiques)
          echo "📤 Import des rapports ZAP (XML)..."
          if [ -f zap-openapi.xml ] && [ -s zap-openapi.xml ]; then
            curl -s -X POST "$DD_URL/api/v2/import-scan/" \
              -H "Authorization: Token $DD_API_KEY" \
              -F "engagement=$ENGAGEMENT_ID" \
              -F "scan_type=ZAP Scan" \
              -F "file=@zap-openapi.xml" \
              -F "close_old_findings=true"
            echo "✅ ZAP OpenAPI importé"
          fi

          if [ -f zap-spider.xml ] && [ -s zap-spider.xml ]; then
            curl -s -X POST "$DD_URL/api/v2/import-scan/" \
              -H "Authorization: Token $DD_API_KEY" \
              -F "engagement=$ENGAGEMENT_ID" \
              -F "scan_type=ZAP Scan" \
              -F "file=@zap-spider.xml" \
              -F "close_old_findings=true"
            echo "✅ ZAP Spider importé"
          fi

          if [ -f zap-active.xml ] && [ -s zap-active.xml ]; then
            curl -s -X POST "$DD_URL/api/v2/import-scan/" \
              -H "Authorization: Token $DD_API_KEY" \
              -F "engagement=$ENGAGEMENT_ID" \
              -F "scan_type=ZAP Scan" \
              -F "file=@zap-active.xml" \
              -F "close_old_findings=true"
            echo "✅ ZAP Active importé"
          fi

      - name: Pipeline terminé
        run: echo "DevSecOps pipeline exécuté avec succès sur runner self-hosted"